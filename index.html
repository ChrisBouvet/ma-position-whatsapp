<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma position</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4285F4">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
            background: #f0f0f0;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 24px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            max-width: 380px;
            width: 100%;
        }
        h2 { margin: 0; }

        /* Sélecteur de voiture */
        .selecteur {
            display: flex;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #ddd;
        }
        .selecteur button {
            flex: 1;
            padding: 10px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            background: #f0f0f0;
            color: #888;
            border-radius: 0;
        }
        .selecteur button.actif {
            background: #4285F4;
            color: white;
        }

        /* Carte voiture */
        .carte-voiture {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 16px;
            border-radius: 10px;
            box-sizing: border-box;
        }
        .carte-voiture.volkswagen { background: #e8f0fe; }
        .carte-voiture.peugeot    { background: #fce8e8; }

        .carte-voiture h3 {
            margin: 0 0 4px 0;
            font-size: 16px;
        }

        button.btn-enregistrer {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            background: #4285F4;
            color: white;
        }
        button.btn-consulter {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            background: #34A853;
            color: white;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .status {
            font-size: 13px;
            color: #888;
            text-align: center;
            min-height: 18px;
        }
        .resultat {
            display: none;
            background: white;
            border-radius: 8px;
            padding: 14px;
            font-size: 13px;
            line-height: 1.8;
        }
        .resultat a { color: #4285F4; }

        #btnChangerNom {
            background: #f0f0f0;
            color: #555;
            font-size: 13px;
            padding: 8px;
            width: 100%;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #nomAffiche { font-size: 13px; color: #999; }

        /* Overlay nom */
        #overlayNom {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #overlayNom.cache { display: none; }
        .carte-nom {
            background: white;
            padding: 28px;
            border-radius: 12px;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .carte-nom input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .carte-nom button {
            padding: 12px;
            background: #4285F4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- Overlay nom -->
<div id="overlayNom">
    <div class="carte-nom">
        <h3 style="margin:0">Bienvenue 👋</h3>
        <p style="margin:0; font-size:14px; color:#666">Quel est votre prénom ? Il sera enregistré sur cet appareil.</p>
        <input type="text" id="inputNom" placeholder="Votre prénom" maxlength="30" />
        <button onclick="enregistrerNom()">Confirmer</button>
    </div>
</div>

<div class="container">
    <h2>🚗 Mes voitures</h2>
    <span id="nomAffiche"></span>

    <!-- Sélecteur -->
    <div class="selecteur">
        <button id="tabVolkswagen" onclick="afficherVoiture('volkswagen')">🚙 Volkswagen</button>
        <button id="tabPeugeot" onclick="afficherVoiture('peugeot')">🚗 Peugeot</button>
    </div>

    <!-- Carte Volkswagen -->
    <div id="carteVolkswagen" class="carte-voiture volkswagen">
        <h3>🚙 Volkswagen</h3>
        <button class="btn-enregistrer" id="btnEnrVW" onclick="sauvegarderPosition('volkswagen')">
            Enregistrer ma position actuelle
        </button>
        <button class="btn-consulter" id="btnConsVW" onclick="consulterPosition('volkswagen')">
            Consulter la dernière position
        </button>
        <div class="status" id="statusVW"></div>
        <div class="resultat" id="resultatVW"></div>
    </div>

    <!-- Carte Peugeot -->
    <div id="cartePeugeot" class="carte-voiture peugeot">
        <h3>🚗 Peugeot</h3>
        <button class="btn-enregistrer" id="btnEnrPG" onclick="sauvegarderPosition('peugeot')">
            Enregistrer ma position actuelle
        </button>
        <button class="btn-consulter" id="btnConsPG" onclick="consulterPosition('peugeot')">
            Consulter la dernière position
        </button>
        <div class="status" id="statusPG"></div>
        <div class="resultat" id="resultatPG"></div>
    </div>

    <button id="btnChangerNom" onclick="demanderNom()">✏️ Changer mon prénom</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ⚠️ Remplace ces valeurs par celles de ton projet Firebase
    const firebaseConfig = {
        apiKey: "REMPLACE_PAR_TA_CLE",
        authDomain: "REMPLACE.firebaseapp.com",
        databaseURL: "https://REMPLACE-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "REMPLACE",
        storageBucket: "REMPLACE.appspot.com",
        messagingSenderId: "REMPLACE",
        appId: "REMPLACE"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- Son de confirmation ---
    function jouerSon() {
        const contexte = new (window.AudioContext || window.webkitAudioContext)();
        const oscillateur = contexte.createOscillator();
        const gain = contexte.createGain();
        oscillateur.connect(gain);
        gain.connect(contexte.destination);
        oscillateur.type = "sine";
        oscillateur.frequency.setValueAtTime(880, contexte.currentTime);
        gain.gain.setValueAtTime(0.3, contexte.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, contexte.currentTime + 0.6);
        oscillateur.start(contexte.currentTime);
        oscillateur.stop(contexte.currentTime + 0.6);
    }

    // --- Gestion du nom ---
    function getNom() { return localStorage.getItem("monPrenom"); }

    function afficherNom() {
        const nom = getNom();
        document.getElementById("nomAffiche").textContent = nom ? `Connecté en tant que : ${nom}` : "";
    }

    window.enregistrerNom = function() {
        const input = document.getElementById("inputNom").value.trim();
        if (!input) return;
        localStorage.setItem("monPrenom", input);
        document.getElementById("overlayNom").classList.add("cache");
        afficherNom();
    };

    window.demanderNom = function() {
        document.getElementById("inputNom").value = getNom() || "";
        document.getElementById("overlayNom").classList.remove("cache");
    };

    document.getElementById("inputNom").addEventListener("keydown", (e) => {
        if (e.key === "Enter") window.enregistrerNom();
    });

    if (!getNom()) {
        document.getElementById("overlayNom").classList.remove("cache");
    } else {
        document.getElementById("overlayNom").classList.add("cache");
        afficherNom();
    }

    // --- Sélecteur de voiture ---
    // Afficher par défaut la Volkswagen
    window.afficherVoiture = function(voiture) {
        document.getElementById("carteVolkswagen").style.display = voiture === "volkswagen" ? "flex" : "none";
        document.getElementById("cartePeugeot").style.display    = voiture === "peugeot"    ? "flex" : "none";
        document.getElementById("tabVolkswagen").classList.toggle("actif", voiture === "volkswagen");
        document.getElementById("tabPeugeot").classList.toggle("actif",    voiture === "peugeot");
    };

    afficherVoiture("volkswagen"); // voiture par défaut

    // --- Géolocalisation ---
    const ids = {
        volkswagen: { enr: "btnEnrVW",  status: "statusVW", resultat: "resultatVW" },
        peugeot:    { enr: "btnEnrPG",  status: "statusPG", resultat: "resultatPG" }
    };

    const labels = {
        volkswagen: "Volkswagen",
        peugeot:    "Peugeot"
    };

    window.sauvegarderPosition = function(voiture) {
        const { enr, status } = ids[voiture];
        const btn = document.getElementById(enr);
        const statusEl = document.getElementById(status);
        const nom = getNom();

        if (!nom) { window.demanderNom(); return; }
        if (!navigator.geolocation) {
            statusEl.textContent = "La géolocalisation n'est pas supportée.";
            return;
        }

        btn.disabled = true;
        statusEl.textContent = "Récupération de la position...";

        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const date = new Date().toLocaleString("fr-FR");

                await set(ref(db, `positions/${voiture}`), { lat, lon, date, nom });

                statusEl.textContent = "Position enregistrée et partagée.";
                jouerSon();
                btn.disabled = false;
            },
            (erreur) => {
                const messages = {
                    1: "Permission de localisation refusée.",
                    2: "Position indisponible.",
                    3: "Délai dépassé, réessayez."
                };
                statusEl.textContent = messages[erreur.code] || "Erreur inconnue.";
                btn.disabled = false;
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    };

    window.consulterPosition = async function(voiture) {
        const { status, resultat } = ids[voiture];
        const statusEl  = document.getElementById(status);
        const resultatEl = document.getElementById(resultat);

        statusEl.textContent = "Chargement...";
        const snapshot = await get(ref(db, `positions/${voiture}`));

        if (!snapshot.exists()) {
            statusEl.textContent = "Aucune position enregistrée pour l'instant.";
            resultatEl.style.display = "none";
            return;
        }

        const { lat, lon, date, nom } = snapshot.val();
        const lienMaps = `https://maps.google.com/?q=${lat},${lon}`;

        statusEl.textContent = "";
        resultatEl.style.display = "block";
        resultatEl.innerHTML = `
            <strong>Dernière position — ${labels[voiture]}</strong><br><br>
            👤 <strong>Par :</strong> ${nom || "Inconnu"}<br>
            📅 <strong>Date :</strong> ${date}<br>
            🌐 <strong>Latitude :</strong> ${lat.toFixed(6)}<br>
            🌐 <strong>Longitude :</strong> ${lon.toFixed(6)}<br><br>
            <a href="${lienMaps}" target="_blank">📍 Voir sur Google Maps</a>
        `;
    };
</script>
</body>
</html>
