<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envoyer ma position</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
            background: #f0f0f0;
        }
        button {
            padding: 16px 32px;
            font-size: 18px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #status {
            margin-top: 16px;
            text-align: center;
            color: #555;
        }
    </style>
</head>
<body>
    <div>
        <button id="btn" onclick="envoyerPosition()">
            📍 Envoyer ma position sur WhatsApp
        </button>
        <p id="status"></p>
    </div>

    <script>
        const PHONE_NUMBER = "33687534936"; // Format international sans +

        function envoyerPosition() {
            const btn = document.getElementById("btn");
            const status = document.getElementById("status");

            if (!navigator.geolocation) {
                status.textContent = "La géolocalisation n'est pas supportée par ce navigateur.";
                return;
            }

            btn.disabled = true;
            status.textContent = "Récupération de la position...";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const message = `Ma position actuelle : https://maps.google.com/?q=${lat},${lon}`;
                    const url = `https://wa.me/${PHONE_NUMBER}?text=${encodeURIComponent(message)}`;
                    window.open(url, "_blank");
                    status.textContent = "Position envoyée !";
                    btn.disabled = false;
                },
                (erreur) => {
                    switch (erreur.code) {
                        case erreur.PERMISSION_DENIED:
                            status.textContent = "Permission de localisation refusée.";
                            break;
                        case erreur.POSITION_UNAVAILABLE:
                            status.textContent = "Position indisponible.";
                            break;
                        case erreur.TIMEOUT:
                            status.textContent = "Délai dépassé, réessayez.";
                            break;
                    }
                    btn.disabled = false;
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }
    </script>
</body>
</html>
